<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BF Räknare</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #d6dde6;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 0;
  }
  .card {
    background: #eef1f5;
    border-radius: 0;
    box-shadow: none;
    padding: 0;
    width: 100%;
    max-width: 440px;
    min-height: 100vh;
  }
  .topbar {
    background: #2e4a6b;
    color: #fff;
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    font-weight: 600;
  }
  .topbar-title {
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: #2e4a6b;
    padding: 8px 16px 12px;
  }
  .inner { padding: 1rem 1rem 2rem; }

  h1 { font-size: 18px; font-weight: 600; color: #222; margin-bottom: 0.2rem; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.25rem; }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
    margin-bottom: 8px;
    margin-top: 1.1rem;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 0.5rem;
  }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #444;
    margin-bottom: 4px;
  }
  .field input, .field select {
    width: 100%;
    padding: 10px 12px;
    font-size: 17px;
    border: 1px solid #b0bcc8;
    border-radius: 6px;
    outline: none;
    color: #111;
    background: #fff;
    -webkit-appearance: none;
  }
  .field input:focus, .field select:focus {
    border-color: #2e6da4;
    background: #fff;
  }
  /* Yellow highlight for Saldo like in the app */
  #saldo { background: #fff59d; border-color: #e0c000; font-weight: 700; }
  #saldo:focus { background: #fffde0; }
  /* Green highlight for ASSQ like in the app */
  #assq { background: #b6f0b6; border-color: #3a9a3a; font-weight: 700; color: #1a5c1a; }
  #assq:focus { background: #d0f7d0; }

  .field.full { grid-column: span 2; }

  .lada-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    margin-bottom: 1.5rem;
  }
  .lada-row .field { flex: 1; }

  button.rakna {
    width: 100%;
    padding: 13px;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    background: #2e6da4;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 1.1rem;
    letter-spacing: 0.01em;
  }
  button.rakna:active { opacity: 0.85; transform: scale(0.98); }

  .result {
    display: none;
    border-radius: 8px;
    padding: 1.25rem;
    text-align: center;
    border: 1px solid #b0bcc8;
  }
  .result.zero { background: #e8eaed; }
  .result.positive { background: #b6f0b6; border-color: #3a9a3a; }

  .result-label { font-size: 14px; color: #444; margin-bottom: 4px; }
  .result-lador {
    font-size: 42px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .result.zero .result-lador { color: #999; }
  .result.positive .result-lador { color: #1a5c1a; }

  .result-produkter {
    font-size: 14px;
    color: #2a6a2a;
    margin-bottom: 4px;
  }
  .result.zero .result-produkter { color: #888; }
  .result-formula { font-size: 12px; color: #888; margin-top: 6px; }

  .reset-wrap { text-align: center; margin-top: 10px; }
  .reset-btn {
    background: transparent;
    border: none;
    color: #888;
    font-size: 13px;
    cursor: pointer;
    text-decoration: underline;
    padding: 4px 0;
  }
</style>
</head>
<body>
<div class="card">
  <div class="topbar-title">BF Räknare</div>
  <div class="inner">
  <p class="subtitle">Räknar ut hur många artiklar du ska hissa</p>

  <div class="section-label">Lagervärden</div>
  <div class="grid">
    <div class="field">
      <label for="saldo">Saldo</label>
      <input type="number" id="saldo" placeholder="0" inputmode="numeric" min="0">
    </div>
    <div class="field">
      <label for="assq">ASSQ</label>
      <input type="number" id="assq" placeholder="0" inputmode="numeric" min="0">
    </div>
    <div class="field">
      <label for="lager">Lager ( )</label>
      <input type="number" id="lager" placeholder="0" inputmode="numeric" min="0">
    </div>
    <div class="field">
      <label for="flex">Flex</label>
      <input type="number" id="flex" placeholder="0" inputmode="numeric" min="0">
    </div>
  </div>

  <div class="section-label">Lådstorlek</div>
  <div class="grid" style="margin-bottom:1.5rem;">
    <div class="field">
      <label for="per-lada">Antal per låda</label>
      <input type="number" id="per-lada" placeholder="t.ex. 20" inputmode="numeric" min="1">
    </div>
    <div class="field">
      <label for="snabb">Snabbval</label>
      <select id="snabb" onchange="valjSnabb()">
        <option value="">– välj –</option>
        <option value="6">6 st</option>
        <option value="10">10 st</option>
        <option value="12">12 st</option>
        <option value="15">15 st</option>
        <option value="20">20 st</option>
        <option value="24">24 st</option>
        <option value="30">30 st</option>
      </select>
    </div>
  </div>

  <button class="rakna" onclick="rakna()">Räkna</button>

  <div class="result" id="result">
    <div class="result-label">Du ska hissa</div>
    <div class="result-lador" id="result-lador">0 lådor</div>
    <div class="result-produkter" id="result-produkter"></div>
    <div class="result-formula" id="result-formula"></div>
  </div>

  <div class="reset-wrap">
    <button class="reset-btn" onclick="nollstall()">Nollställ</button>
  </div>
  </div><!-- /inner -->
</div>

<script>
  function hämta(id) { return parseFloat(document.getElementById(id).value) || 0; }

  function valjSnabb() {
    const val = document.getElementById('snabb').value;
    if (val) document.getElementById('per-lada').value = val;
  }

  function rakna() {
    const s = hämta('saldo'), a = hämta('assq'), l = hämta('lager'), f = hämta('flex');
    const perLada = hämta('per-lada');
    const res = s - a - l - f;
    const box = document.getElementById('result');
    const ladorEl = document.getElementById('result-lador');
    const prodEl = document.getElementById('result-produkter');
    const formEl = document.getElementById('result-formula');

    box.style.display = 'block';

    if (res <= 0) {
      box.className = 'result zero';
      ladorEl.textContent = '0 lådor';
      prodEl.textContent = 'Inget att hissa just nu.';
      formEl.textContent = s + ' − ' + a + ' − ' + l + ' − ' + f + ' = ' + Math.round(res);
    } else {
      box.className = 'result positive';
      if (perLada > 0) {
        const antal = Math.floor(res / perLada);
        const ladaText = antal === 1 ? '1 låda' : antal + ' lådor';
        ladorEl.textContent = ladaText;
        prodEl.textContent = '(' + Math.round(res) + ' artiklar, ' + perLada + ' st/låda)';
      } else {
        ladorEl.textContent = Math.round(res) + ' artiklar';
        prodEl.textContent = 'Ange antal per låda för att se lådor';
      }
      formEl.textContent = s + ' − ' + a + ' − ' + l + ' − ' + f + ' = ' + Math.round(res);
    }
  }

  function nollstall() {
    ['saldo','assq','lager','flex','per-lada'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('snabb').value = '';
    document.getElementById('result').style.display = 'none';
    document.getElementById('saldo').focus();
  }

  document.querySelectorAll('input').forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') rakna(); });
  });
</script>
</body>
</html>
